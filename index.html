<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Convidados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/main.js" defer></script>
<script>
  // Esconde o conteúdo até confirmar a sessão para evitar piscar o painel
  document.documentElement.style.visibility = 'hidden';
  (async function() {
    try {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error || !data.session) {
        window.location.replace('login.html');
      } else {
        document.documentElement.style.visibility = 'visible';
      }
    } catch (err) {
      window.location.replace('login.html');
    }
  })();
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) window.location.replace('login.html');
  });
  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }
</script>
<style>
    :root {
        --c-primary: #3D7A6C;
        --c-gold: #C5A059;
        --c-bg: #FCFBF8;
        --c-text: #23352A;
        --font-serif: 'Cormorant Garamond', serif;
        --font-sans: 'Montserrat', sans-serif;
    }

    body {
        margin: 0;
        padding: 40px 20px;
        font-family: var(--font-sans);
        background: linear-gradient(rgba(252, 251, 248, 0.88), rgba(252, 251, 248, 0.95)), 
                    url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Raphael_-_Sistine_Madonna_-_detail.jpg/1280px-Raphael_-_Sistine_Madonna_-_detail.jpg') center/cover no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        color: var(--c-text);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(197, 160, 89, 0.3);
        border-radius: 16px;
        padding: 50px 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), inset 0 0 20px rgba(197, 160, 89, 0.05);
        text-align: center;
        position: relative;
    }

    .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--c-gold), transparent);
    }
    
    .icon-cross {
        width: 40px;
        height: 40px;
        color: var(--c-gold);
        margin: 0 auto 15px auto;
        opacity: 0.9;
        display: block;
    }

    h1, h2 {
        font-family: var(--font-serif);
        color: var(--c-text);
        font-weight: 600;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 25px;
    }

    h2 {
        font-size: 1.8rem;
        margin-bottom: 20px;
        margin-top: 30px;
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        padding-bottom: 10px;
        display: inline-block;
    }

    .form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 25px;
    }

    .form-row {
        display: flex;
        gap: 15px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
    }

    input[type="text"], input[type="file"] {
        padding: 12px 5px;
        border: none;
        border-bottom: 1px solid rgba(197, 160, 89, 0.4);
        background: transparent;
        font-family: var(--font-sans);
        font-size: 1rem;
        color: var(--c-text);
        outline: none;
        transition: border 0.2s ease;
        flex-grow: 1;
        min-width: 200px;
    }

    input::placeholder {
        color: rgba(35, 53, 42, 0.4);
        font-style: italic;
        font-family: var(--font-serif);
        font-size: 1.1rem;
    }

    input:focus {
        border-bottom-color: var(--c-primary);
    }

    button, .dashboard-link {
        background: transparent;
        color: var(--c-primary);
        border: 1px solid var(--c-primary);
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: var(--font-sans);
        text-decoration: none;
        display: inline-block;
    }

    button:hover, .dashboard-link:hover {
        background: var(--c-primary);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(61, 122, 108, 0.2);
    }

    .btn-danger {
        border-color: #e57373;
        color: #e57373;
    }

    .btn-danger:hover {
        background: #e57373;
        color: white;
        box-shadow: 0 8px 20px rgba(229, 115, 115, 0.2);
    }

    #listaConvidados {
        list-style: none;
        padding: 0;
        margin: 0 auto 30px auto;
        max-height: 400px;
        overflow-y: auto;
        width: 100%;
        text-align: left;
    }

    /* Estilização da barra de rolagem do painel */
    #listaConvidados::-webkit-scrollbar {
        width: 6px;
    }
    #listaConvidados::-webkit-scrollbar-track {
        background: rgba(197, 160, 89, 0.1);
        border-radius: 10px;
    }
    #listaConvidados::-webkit-scrollbar-thumb {
        background: rgba(197, 160, 89, 0.4);
        border-radius: 10px;
    }

    #listaConvidados li {
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        margin-bottom: 5px;
        padding: 15px 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.3s ease;
    }
    
    #listaConvidados li:hover {
        background: rgba(197, 160, 89, 0.05);
    }
    
    #listaConvidados li .guest-info {
        flex-grow: 1;
    }

    #listaConvidados li .guest-info span {
        font-family: var(--font-serif);
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--c-text);
    }

    #listaConvidados li .guest-info strong {
        font-family: var(--font-sans);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--c-gold);
        font-weight: 500;
        margin-left: 5px;
    }

    #listaConvidados li .guest-details {
        font-size: 0.85rem; 
        color: var(--c-text); 
        opacity: 0.7;
        margin-top: 4px;
        font-family: var(--font-sans);
    }

    #listaConvidados li .guest-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }

    #listaConvidados li a {
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        border: 1px solid var(--c-primary);
        color: var(--c-primary);
        background: transparent;
    }

    #listaConvidados li a:first-child:hover,
    #listaConvidados li .info-btn:hover {
        background: var(--c-primary);
        color: white;
    }

    #listaConvidados li .delete-btn {
        border-color: #e57373;
        color: #e57373;
    }
    #listaConvidados li .delete-btn:hover {
        background: #e57373;
        color: white;
    }

    /* Ajustes responsivos */
    @media (max-width: 600px) {
        #listaConvidados li {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        #listaConvidados li .guest-actions {
            width: 100%;
            justify-content: flex-start;
        }
    }
</style>
</head>
<body>
<div class="container">
    <!-- Ícone de Cruz + Asas -->
    <svg class="icon-cross" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M60 15 v90 M35 45 h50" stroke-linecap="round"/>
        <path d="M50 45 C35 30, 15 35, 20 60 C25 85, 45 70, 50 60" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M70 45 C85 30, 105 35, 100 60 C95 85, 75 70, 70 60" stroke-linecap="round" stroke-linejoin="round"/>
        <ellipse cx="60" cy="12" rx="10" ry="3" opacity="0.6"/>
    </svg>

    <h1>Gestão de Convidados</h1>
    <div class="form">
        <div class="form-row">
            <input type="text" id="nome" placeholder="Nome do convidado">
            <button onclick="adicionarConvidado()">Adicionar</button>
        </div>
    </div>
    <div class="form-row" style="margin-top: 20px; border-top: 1px solid rgba(197, 160, 89, 0.2); padding-top: 25px;">
        <span style="font-family: var(--font-serif); font-size: 1.2rem; color: var(--c-text); width: 100%; text-align: center;">Ou importe de uma planilha Excel</span>
        <input type="file" id="xlsx_file" accept=".xlsx, .xls">
        <button onclick="importarConvidados()">Importar</button>
        <a href="#" onclick="baixarExemploPlanilha(event)" style="font-size: 0.8rem; width: 100%; text-align: center; margin-top: 5px;">Baixar planilha de exemplo</a>
    </div>
    <div class="form" style="margin-top: 10px;">
        <button onclick="exportarConvidados(this)">📥 Baixar Lista Completa (.xlsx)</button>
    </div>
    <h2>Lista de Convidados</h2>
    <ul id="listaConvidados"></ul>
    <a href="gifts/dashboard.html" class="dashboard-link">Ver Dashboard de Presentes</a>
    <div style="margin-top: 20px;">
        <button onclick="logout()" class="btn-danger">
        Sair do Painel
        </button>
    </div>
</div>
<script>
    // A lógica principal agora está em js/main.js
    // As funções abaixo foram adaptadas para usar o Supabase
    function importarConvidados() {
        const fileInput = document.getElementById('xlsx_file');
        const file = fileInput.files[0];

        if (!file) {
            alert('Por favor, selecione um arquivo .xlsx para importar.');
            return;
        }

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

            if (json.length <= 1) {
                alert('A planilha parece estar vazia ou não contém convidados.');
                return;
            }

            // Pula o cabeçalho (linha 0) e começa da linha 1
            for (let i = 1; i < json.length; i++) {
                const row = json[i];
                const nome = row[0] ? String(row[0]).trim() : '';
                if (nome) {
                    document.getElementById('nome').value = nome;
                    await adicionarConvidado(); // Usando a função de main.js
                    // Adiciona um pequeno delay para não sobrecarregar o browser/localStorage de uma vez
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
            alert(`${json.length - 1} convidados foram processados para importação.`);
            fileInput.value = ''; // Limpa o input
        };
        reader.readAsArrayBuffer(file);
    }

    function baixarExemploPlanilha(event) {
        event.preventDefault();
        const ws = XLSX.utils.aoa_to_sheet([["NomeConvidado"], ["Fulano de Tal"], ["Ciclana da Silva"], ["Beltrano Souza"]]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Convidados");
        XLSX.writeFile(wb, "exemplo_convidados.xlsx");
    }

    async function exportarConvidados(btn) {
        const originalText = btn.innerText;
        try {
            btn.innerText = "Gerando planilha...";
            btn.disabled = true;

            const { data: convidados, error } = await supabaseClient
                .from('guests')
                .select('*')
                .order('name', { ascending: true });

            if (error) throw error;

            if (!convidados || convidados.length === 0) {
                alert("Nenhum convidado encontrado na base de dados.");
            } else {
                const ws = XLSX.utils.json_to_sheet(convidados);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Convidados");
                XLSX.writeFile(wb, "lista_completa_convidados.xlsx");
            }
        } catch (error) {
            console.error('Erro ao exportar:', error);
            alert('Erro ao exportar convidados. Verifique o console.');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
